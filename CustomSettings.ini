; Sanitized — domain, credentials, OU, and naming are placeholders.
; The deployment service account is least-privilege (domain-join rights only).
[Settings]
Priority=Default
Properties=MyCustomProperty

[Default]
OSInstall=Y
SkipCapture=YES
SkipAdminPassword=NO
SkipProductKey=NO
SkipComputerBackup=YES
SkipBitLocker=YES

SkipComputerName=NO
SkipOSChoice=NO
SkipLocaleSelection=YES
SkipTimeZone=YES

JoinDomain=contoso.com
DomainAdmin=svc-mdt-join
DomainAdminDomain=CONTOSO
DomainAdminPassword=<SERVICE_ACCOUNT_PASSWORD>
MachineObjectOU=OU=Workstations,DC=contoso,DC=com
SkipDomainMembership=YES

EventService=http://MDT-SERVER:9800

KeyboardLocale=en-US
UserLocale=en-US
UILanguage=en-US
TimeZoneName=Eastern Standard Time
ComputerName=CORP-LAP-X
